# SwiftLint Configuration for Glimpse
# Modern Swift 6.0 / macOS 15+ configuration

# Paths to exclude from linting
excluded:
  - DerivedData
  - .build
  - .swiftpm
  - Pods
  - Carthage
  - Package.swift
  - "*/Generated/*"

# Enabled rules beyond defaults
opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - file_header
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - last_where
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_literal_brackets
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - prohibited_super_call
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

# Disabled rules (conflicts with SwiftFormat or too strict)
disabled_rules:
  - trailing_comma # SwiftFormat handles this
  - opening_brace # SwiftFormat handles this
  - statement_position # SwiftFormat handles this
  - todo # Allow TODO comments during development
  - trailing_whitespace # SwiftFormat handles this

# Rule configurations
line_length:
  warning: 120
  error: 200
  ignores_comments: true
  ignores_urls: true
  ignores_function_declarations: false
  ignores_interpolated_strings: true

file_length:
  warning: 500
  error: 1000
  ignore_comment_only_lines: true

function_body_length:
  warning: 50
  error: 100

type_body_length:
  warning: 300
  error: 500

cyclomatic_complexity:
  warning: 15
  error: 25

nesting:
  type_level:
    warning: 3
    error: 5
  function_level:
    warning: 3
    error: 5

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - z
    - i
    - j
    - k
    - to
    - ax # Accessibility prefix

type_name:
  min_length:
    warning: 3
    error: 2
  max_length:
    warning: 50
    error: 60

# Modern Swift patterns
implicit_return:
  included:
    - closure
    - getter

modifier_order:
  preferred_modifier_order:
    - acl
    - setterACL
    - override
    - dynamic
    - mutating
    - lazy
    - final
    - required
    - convenience
    - typeMethods
    - owned

# File header template (optional - customize as needed)
file_header:
  required_pattern: |
                    \/\/
                    \/\/  .*\.swift
                    \/\/  Glimpse
                    \/\/
                    \/\/  Created by .*
                    \/\/

# Custom rules
custom_rules:
  no_print_in_production:
    name: "No print() in production code"
    regex: "\\bprint\\s*\\("
    message: "Use os_log or Logger instead of print() for production code"
    severity: warning
    match_kinds:
      - identifier
